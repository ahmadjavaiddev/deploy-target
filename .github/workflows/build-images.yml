name: build-images

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - tag: v1.0.0
            version: 1.0.0
            fail_after_sec: 0
          - tag: v1.1.0
            version: 1.1.0
            fail_after_sec: 0
          - tag: v1.2.0
            version: 1.2.0
            fail_after_sec: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.tag }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/ahmadjavaiddev/deploy-target:${{ matrix.tag }}
          build-args: |
            VERSION=${{ matrix.version }}
            FAIL_AFTER_SEC=${{ matrix.fail_after_sec }}
