name: ci

on:
  push:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Boot server and check /health
        run: |
          node server.js &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/health -o /tmp/health.json; then
              break
            fi
            sleep 0.5
          done
          STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" http://localhost:3000/health)
          cat /tmp/health.json
          kill $SERVER_PID
          if [ "$STATUS" != "200" ]; then
            echo "expected 200, got $STATUS"
            exit 1
          fi
